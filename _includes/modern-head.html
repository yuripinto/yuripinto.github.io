<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <!--<link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">-->
  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      plugins: [
        function({ addComponents, theme }) {
          addComponents({
            '.md-content': {
              'h1': { '@apply text-4xl font-bold mb-4 mt-8': {} },
              'h2': { '@apply text-3xl font-bold mb-3 mt-6': {} },
              'h3': { '@apply text-2xl font-bold mb-2 mt-4': {} },
              'p': { '@apply mb-4 text-lg leading-relaxed': {} },
              'ul': { '@apply list-disc ml-6 mb-4': {} },
              'ol': { '@apply list-decimal ml-6 mb-4': {} },
              'li': { '@apply mb-2': {} },
              'a': { '@apply text-blue-600 hover:text-blue-800 underline': {} },
              'blockquote': { '@apply pl-4 border-l-4 border-gray-300 italic my-4': {} },
              'code': { '@apply bg-gray-100 px-1 py-0.5 rounded': {} },
              'pre': { '@apply bg-gray-100 p-4 rounded mb-4 overflow-x-auto': {} }
            }
          })
        }
      ]
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    .embed-container {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        max-width: 100%;
        iframe,
        object,
        embed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    }
  </style>
</head>
